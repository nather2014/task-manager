services:
  task-db:
    image: postgres:16-alpine
    container_name: task-manager-db
    restart: always
    environment:
      - POSTGRES_USER=taskmanageruser
      - POSTGRES_PASSWORD=taskmanagerpassword
      - POSTGRES_DB=taskmanagerdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanageruser -d taskmanagerdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
